<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D0B18"/>
      <stop offset="100%" style="stop-color:#6B1F45"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <!-- Two hearts interlinked -->
  <text x="200" y="170" font-size="90" text-anchor="middle" dominant-baseline="middle">💕</text>
  <text x="200" y="260" font-family="Georgia, serif" font-size="22" fill="#FFB6C1" text-anchor="middle" font-style="italic">Every moment with you</text>
  <text x="200" y="295" font-family="Georgia, serif" font-size="16" fill="#FF85A1" text-anchor="middle">🌸</text>
  <!-- Decorative dots -->
  <circle cx="40" cy="40" r="4" fill="rgba(255,182,193,0.4)"/>
  <circle cx="360" cy="40" r="4" fill="rgba(255,182,193,0.4)"/>
  <circle cx="40" cy="360" r="4" fill="rgba(255,182,193,0.4)"/>
  <circle cx="360" cy="360" r="4" fill="rgba(255,182,193,0.4)"/>
  <rect x="20" y="20" width="360" height="360" rx="8" fill="none" stroke="rgba(255,182,193,0.2)" stroke-width="1"/>
</svg>
